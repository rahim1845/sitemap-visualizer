<!DOCTYPE html>

    <title>Sitemap Visualizer & Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Custom scrollbar for code editor feel */
      textarea {
        font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
      }
      /* Ensure SVG text is crisp */
      svg {
        shape-rendering: geometricPrecision;
        text-rendering: geometricPrecision;
      }
      /* Hide scrollbars in SVG container if any accidentally appear */
      .foreign-object-body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
    </style>
